<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>2026 장애유형별 평생교육 디지털 콘텐츠 · WBS</title>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;600&family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyAGiSO8JM8waJQz7NeyFBdRoTUfACx8aCM",
    authDomain: "disability-wbs-2026.firebaseapp.com",
    projectId: "disability-wbs-2026",
    storageBucket: "disability-wbs-2026.firebasestorage.app",
    messagingSenderId: "109567858253",
    appId: "1:109567858253:web:e0bcb8b7da0726adf22e04",
    measurementId: "G-SNJ4SFJV1Q"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  enableIndexedDbPersistence(db).catch(()=>{});
  const docRef = doc(db, 'wbs', 'main');
  window.fbSetDoc = (d) => setDoc(docRef, d);
  window.fbOnSnap = (cb) => onSnapshot(docRef, cb);
  window.fbReady = true;
  document.dispatchEvent(new Event('fbready'));
</script>
<style>
  :root{
    --forest:#001e2b;
    --mg-green:#00ed64;
    --dark-green:#00684a;
    --action-blue:#006cfa;
    --hover-blue:#3860be;
    --teal-active:#1eaedb;
    --deep-teal:#1c2d38;
    --teal-gray:#3d4f58;
    --cool-gray:#5c6c75;
    --silver-teal:#b8c4c2;
    --light-input:#e8edeb;
    --bg-light:#f9fbfb;
    --shadow-forest:rgba(0,30,43,0.12) 0px 26px 44px, rgba(0,0,0,0.13) 0px 7px 13px;
    --shadow-card:rgba(0,30,43,0.08) 0px 4px 16px, rgba(0,0,0,0.06) 0px 1px 3px;
    --shadow-subtle:rgba(0,0,0,0.06) 0px 2px 6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg-light);color:#000;font-family:'Pretendard Variable','Pretendard','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:300;line-height:1.5;font-size:15px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  a{color:var(--action-blue);text-decoration:none}
  a:hover{color:var(--hover-blue)}

  /* ===== HEADER (FOREST) ===== */
  header.hero{background:var(--forest);color:#fff;padding:32px 40px 28px;position:relative;overflow:hidden}
  header.hero::before{content:'';position:absolute;top:-200px;right:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,237,100,0.12) 0%,transparent 60%);pointer-events:none}
  .hero-inner{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;max-width:1600px;margin:0 auto;position:relative;z-index:1}
  .hero-title-block .code-label{font-family:'Source Code Pro',monospace;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--mg-green);margin-bottom:8px;display:block}
  .hero-title{font-family:'Noto Serif KR',serif;font-weight:700;font-size:38px;line-height:1.2;letter-spacing:-0.02em;color:#fff}
  .hero-title em{font-style:normal;color:var(--mg-green);border-bottom:2px solid var(--mg-green);padding-bottom:2px}
  .hero-sub{font-size:14px;color:var(--light-input);font-weight:300;margin-top:8px}
  .hero-toolbar{display:flex;gap:8px;flex-wrap:wrap}
  .btn{border-radius:100px;padding:10px 20px;font-size:13px;font-weight:500;letter-spacing:0.5px;transition:all 0.2s;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:var(--mg-green);color:#000;border-color:var(--mg-green)}
  .btn-primary:hover{background:#33ee75;transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:#fff;border-color:var(--teal-gray)}
  .btn-ghost:hover{background:var(--deep-teal);border-color:var(--silver-teal)}
  .btn-outline{background:#fff;color:var(--forest);border-color:var(--silver-teal)}
  .btn-outline:hover{background:var(--bg-light)}

  /* ===== MILESTONES (DARK STRIP) ===== */
  .milestones{background:var(--deep-teal);padding:24px 40px;border-top:1px solid var(--teal-gray)}
  .milestones-inner{max-width:1600px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media (max-width:880px){.milestones-inner{grid-template-columns:1fr 1fr}}
  .ms-card{background:var(--forest);border:1px solid var(--teal-gray);border-radius:16px;padding:18px 20px;position:relative}
  .ms-card::before{content:'';position:absolute;left:20px;right:20px;top:18px;height:2px;background:var(--mg-green);opacity:0.8}
  .ms-flag{font-family:'Source Code Pro',monospace;font-size:11px;font-weight:600;letter-spacing:2px;color:var(--mg-green);text-transform:uppercase;margin-top:8px}
  .ms-name{font-size:16px;font-weight:500;color:#fff;margin:6px 0}
  .ms-date{font-size:12px;color:var(--silver-teal);font-weight:300}

  /* ===== SUMMARY STATS ===== */
  .summary{background:#fff;border-bottom:1px solid var(--silver-teal);padding:24px 40px}
  .summary-inner{max-width:1600px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:24px}
  @media (max-width:680px){.summary-inner{grid-template-columns:repeat(2,1fr)}}
  .stat{text-align:center;padding:8px}
  .stat-label{font-family:'Source Code Pro',monospace;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--cool-gray);margin-bottom:6px}
  .stat-val{font-family:'Noto Serif KR',serif;font-weight:700;font-size:36px;line-height:1;color:var(--forest)}
  .stat-val.green{color:var(--dark-green)}
  .stat-val.blue{color:var(--action-blue)}
  .stat-val.red{color:#cd2c2c}
  .stat-val.amber{color:#cc7700}

  /* ===== FILTER BAR ===== */
  .filterbar{background:#fff;padding:16px 40px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--silver-teal);position:sticky;top:0;z-index:50}
  .filterbar-inner{max-width:1600px;margin:0 auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap;width:100%}
  .view-tabs{display:flex;gap:0;background:var(--bg-light);border-radius:100px;padding:4px;border:1px solid var(--silver-teal)}
  .view-tabs button{border-radius:100px;padding:7px 16px;font-size:13px;font-weight:500;color:var(--cool-gray);transition:all 0.15s}
  .view-tabs button.active{background:var(--forest);color:#fff}
  .filterbar select,.filterbar input{border:1px solid var(--silver-teal);padding:8px 12px;font-size:13px;border-radius:8px;font-family:inherit;background:#fff;color:#000}
  .filterbar input[type=search]{min-width:220px}
  .filterbar select:focus,.filterbar input:focus{outline:none;border-color:var(--dark-green);box-shadow:0 0 0 3px rgba(0,104,74,0.1)}
  .filter-count{margin-left:auto;font-family:'Source Code Pro',monospace;font-size:11px;font-weight:600;color:var(--cool-gray);letter-spacing:1px}

  /* ===== MAIN ===== */
  main{padding:24px 40px 60px;max-width:1600px;margin:0 auto}

  /* ===== DASHBOARD CARDS ===== */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .lesson-card{background:#fff;border:1px solid var(--silver-teal);border-radius:16px;padding:18px 20px;cursor:pointer;transition:all 0.2s;position:relative;box-shadow:var(--shadow-subtle);border-left-width:4px;border-left-color:var(--silver-teal)}
  .lesson-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-card);border-color:var(--dark-green)}
  .lesson-card.is-delayed{border-left-color:#cd2c2c;background:linear-gradient(90deg,#fdedeb 0%,#fff 12%)}
  .lesson-card.is-delayed:hover{border-color:#cd2c2c;border-left-color:#cd2c2c}
  .lesson-card.is-ms-pending:not(.is-delayed){border-left-color:#cc7700;background:linear-gradient(90deg,#fff7ec 0%,#fff 12%)}
  .lesson-card.is-ms-pending:not(.is-delayed):hover{border-color:#cc7700;border-left-color:#cc7700}
  .urgency-dot{display:inline-block;width:8px;height:8px;border-radius:100px;margin-left:4px;vertical-align:middle}
  .urgency-dot.high{background:#cd2c2c;box-shadow:0 0 0 2px rgba(205,44,44,0.2)}
  .urgency-dot.medium{background:#cc7700}
  .urgency-dot.low{background:var(--action-blue)}
  .badge-ms{padding:3px 10px;border-radius:100px;font-size:11px;font-family:'Source Code Pro',monospace;letter-spacing:0.5px;font-weight:500}
  .badge-ms.ok{background:rgba(0,237,100,0.15);color:var(--dark-green)}
  .badge-ms.pending{background:#fff3e0;color:#cc7700}
  .lesson-card .lc-phase{position:absolute;top:18px;right:18px;font-family:'Source Code Pro',monospace;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--cool-gray);background:var(--bg-light);padding:3px 10px;border-radius:100px;border:1px solid var(--silver-teal)}
  .lesson-card .lc-phase.p1{background:rgba(0,237,100,0.1);color:var(--dark-green);border-color:var(--mg-green)}
  .lesson-card .lc-phase.p2{background:rgba(0,108,250,0.08);color:var(--action-blue);border-color:rgba(0,108,250,0.3)}
  .lesson-card .lc-id{font-family:'Source Code Pro',monospace;font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--dark-green);text-transform:uppercase;margin-bottom:6px}
  .lesson-card .lc-name{font-size:16px;font-weight:500;line-height:1.35;color:#000;margin-bottom:4px;padding-right:90px;min-height:42px}
  .lesson-card .lc-meta{font-size:13px;color:var(--cool-gray);font-weight:300}
  .lesson-card .lc-stages{display:flex;gap:3px;margin:14px 0 6px}
  .lc-stage{flex:1;height:6px;border-radius:100px;background:var(--silver-teal)}
  .lc-stage.todo{background:var(--silver-teal)}
  .lc-stage.in-progress{background:var(--mg-green)}
  .lc-stage.done{background:var(--dark-green)}
  .lc-stage.is-delayed{background:#cd2c2c}
  .lc-stage.in-progress.is-delayed{background:#cd2c2c}
  .lc-stage.done.is-delayed{background:#cc7700}
  .lc-stage-labels{display:flex;gap:3px;font-family:'Source Code Pro',monospace;font-size:9px;letter-spacing:0.5px;color:var(--cool-gray);text-align:center;text-transform:uppercase;font-weight:500}
  .lc-stage-labels span{flex:1}
  .lc-footer{display:flex;gap:8px;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--bg-light);font-size:12px;color:var(--cool-gray)}
  .badge-issue{background:#fdedeb;color:#cd2c2c;padding:3px 10px;border-radius:100px;font-weight:600;font-size:11px;font-family:'Source Code Pro',monospace;letter-spacing:0.5px}
  .badge-issue.ok{background:rgba(0,237,100,0.15);color:var(--dark-green)}
  .badge-video{background:var(--bg-light);color:var(--cool-gray);padding:3px 10px;border-radius:100px;font-size:11px;font-family:'Source Code Pro',monospace;letter-spacing:0.5px;font-weight:500}

  /* ===== TABLE ===== */
  table.wbs{width:100%;border-collapse:separate;border-spacing:0;background:#fff;font-size:13px;border:1px solid var(--silver-teal);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-subtle)}
  table.wbs thead th{background:var(--forest);color:#fff;padding:14px;text-align:left;font-family:'Source Code Pro',monospace;font-weight:500;font-size:11px;letter-spacing:1.5px;text-transform:uppercase}
  table.wbs tbody td{padding:12px 14px;border-bottom:1px solid var(--bg-light);vertical-align:middle;font-weight:300}
  table.wbs tbody tr{transition:background 0.15s}
  table.wbs tbody tr:hover{background:var(--bg-light);cursor:pointer}
  table.wbs .stage-mini{display:inline-flex;gap:3px;align-items:center}
  table.wbs .stage-mini span{width:18px;height:6px;border-radius:100px;background:var(--silver-teal)}
  table.wbs .stage-mini span.in-progress{background:var(--mg-green)}
  table.wbs .stage-mini span.done{background:var(--dark-green)}
  table.wbs strong{font-family:'Source Code Pro',monospace;font-size:12px;color:var(--dark-green);letter-spacing:1px}

  /* ===== KANBAN ===== */
  .kanban{display:flex;gap:14px;overflow-x:auto;padding:4px 0 16px;min-height:600px}
  .kanban-col{background:var(--bg-light);border:1px solid var(--silver-teal);border-radius:16px;padding:14px;min-width:280px;flex:1;display:flex;flex-direction:column}
  .kanban-col.drag-over{background:rgba(0,237,100,0.06);border-color:var(--mg-green)}
  .kanban-col h3{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:'Source Code Pro',monospace;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--forest)}
  .kanban-col h3 .count{background:var(--forest);color:var(--mg-green);padding:2px 10px;border-radius:100px;font-size:11px;letter-spacing:0.5px}
  .kanban-col .lesson-card{margin-bottom:10px;padding:12px 14px;cursor:grab;user-select:none}
  .kanban-col .lesson-card:active{cursor:grabbing}
  .kanban-col .lesson-card.dragging{opacity:0.5;cursor:grabbing}
  .kanban-col .lesson-card .lc-name{font-size:13px;min-height:auto;padding-right:0;margin-top:4px}
  .kanban-col .lesson-card .lc-meta{font-size:11px}
  .kanban-col .lesson-card .lc-phase{display:none}
  .kanban-empty{padding:30px;text-align:center;color:var(--cool-gray);font-size:12px;font-family:'Source Code Pro',monospace;letter-spacing:1px;text-transform:uppercase;border:2px dashed var(--silver-teal);border-radius:8px}

  /* ===== ISSUES ===== */
  .issue-list{display:flex;flex-direction:column;gap:10px}
  .issue-item{background:#fff;border:1px solid var(--silver-teal);border-left:4px solid var(--cool-gray);border-radius:12px;padding:16px 20px;cursor:pointer;transition:all 0.15s;box-shadow:var(--shadow-subtle)}
  .issue-item:hover{background:var(--bg-light);transform:translateX(2px)}
  .issue-item.high{border-left-color:#cd2c2c}
  .issue-item.medium{border-left-color:#cc7700}
  .issue-item.low{border-left-color:var(--action-blue)}
  .issue-item.closed{opacity:0.5}
  .issue-item.closed .ii-title{text-decoration:line-through}
  .ii-head{display:flex;gap:10px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
  .ii-lesson{background:var(--forest);color:#fff;padding:3px 10px;border-radius:100px;font-family:'Source Code Pro',monospace;font-size:10px;letter-spacing:1px;font-weight:500}
  .ii-prio{padding:2px 10px;border-radius:100px;font-family:'Source Code Pro',monospace;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
  .ii-prio.high{background:#fdedeb;color:#cd2c2c}
  .ii-prio.medium{background:#fff3e0;color:#cc7700}
  .ii-prio.low{background:rgba(0,108,250,0.08);color:var(--action-blue)}
  .ii-status{font-family:'Source Code Pro',monospace;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--cool-gray)}
  .ii-status.open{color:#cd2c2c}
  .ii-title{font-size:16px;font-weight:500;color:#000}
  .ii-desc{font-size:13px;color:var(--cool-gray);margin-top:6px;font-weight:300}
  .ii-meta{font-size:11px;color:var(--cool-gray);margin-top:6px;font-family:'Source Code Pro',monospace;letter-spacing:0.3px}

  /* ===== MODAL ===== */
  .modal-bg{position:fixed;inset:0;background:rgba(0,30,43,0.6);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 20px;overflow-y:auto;backdrop-filter:blur(4px)}
  .modal-bg.active{display:flex}
  .modal{background:#fff;border-radius:24px;max-width:920px;width:100%;padding:32px 36px;margin:auto;position:relative;box-shadow:var(--shadow-forest)}
  .modal-close{position:absolute;top:20px;right:24px;background:transparent;border:none;font-size:28px;color:var(--cool-gray);cursor:pointer;width:40px;height:40px;border-radius:100px;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
  .modal-close:hover{background:var(--bg-light)}
  .modal-id{font-family:'Source Code Pro',monospace;font-size:12px;font-weight:600;letter-spacing:2px;color:var(--dark-green);text-transform:uppercase;margin-bottom:6px}
  .modal h2{font-family:'Noto Serif KR',serif;font-weight:700;font-size:28px;line-height:1.25;margin-bottom:6px;color:var(--forest)}
  .modal .modal-sub{color:var(--cool-gray);font-size:14px;margin-bottom:20px;font-weight:300}
  .info-row{display:flex;gap:10px;margin-bottom:8px;font-size:14px;align-items:center}
  .info-row label{font-family:'Source Code Pro',monospace;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;width:90px;color:var(--cool-gray);flex-shrink:0}
  .info-row input,.info-row select{border:1px solid var(--silver-teal);padding:7px 12px;font-size:13px;border-radius:8px;flex:1;font-family:inherit;background:#fff}
  .info-row input:focus,.info-row select:focus{outline:none;border-color:var(--dark-green);box-shadow:0 0 0 3px rgba(0,104,74,0.1)}
  .stages-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:18px 0}
  @media (max-width:680px){.stages-grid{grid-template-columns:1fr}}
  .stage-card{border:1px solid var(--silver-teal);border-radius:12px;padding:14px 16px;background:var(--bg-light)}
  .sc-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
  .sc-name{font-family:'Source Code Pro',monospace;font-weight:600;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--forest)}
  .sc-row{display:flex;gap:8px;align-items:center;margin-top:6px;font-size:12px}
  .sc-row label{font-family:'Source Code Pro',monospace;font-weight:500;width:50px;color:var(--cool-gray);font-size:10px;letter-spacing:1px;text-transform:uppercase}
  .sc-row input,.sc-row select,.sc-row textarea{border:1px solid var(--silver-teal);padding:5px 10px;font-size:12px;font-family:inherit;border-radius:6px;flex:1;background:#fff}
  .sc-row textarea{min-height:42px;resize:vertical;font-weight:300}
  .status-badge{padding:3px 12px;border-radius:100px;font-family:'Source Code Pro',monospace;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
  .status-badge.todo{background:var(--bg-light);color:var(--cool-gray);border:1px solid var(--silver-teal)}
  .status-badge.in-progress{background:rgba(0,237,100,0.15);color:var(--dark-green)}
  .status-badge.done{background:var(--forest);color:var(--mg-green)}

  /* ===== STAGES TABLE (in modal) ===== */
  .stages-table{width:100%;margin:14px 0 8px;border-collapse:separate;border-spacing:0;font-size:12px;background:#fff;border:1px solid var(--silver-teal);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-subtle)}
  .stages-table thead th{background:var(--deep-teal);color:var(--mg-green);padding:10px 12px;text-align:left;font-family:'Source Code Pro',monospace;font-weight:500;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
  .stages-table tbody td{padding:8px 10px;border-bottom:1px solid var(--bg-light);vertical-align:middle}
  .stages-table tbody tr:last-child td{border-bottom:none}
  .stages-table tbody tr:nth-child(even){background:var(--bg-light)}
  .stages-table .st-name{font-family:'Source Code Pro',monospace;font-weight:600;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--forest);white-space:nowrap}
  .stages-table input,.stages-table select{border:1px solid var(--silver-teal);padding:5px 8px;font-size:12px;border-radius:6px;font-family:inherit;background:#fff;width:100%}
  .stages-table input:focus,.stages-table select:focus{outline:none;border-color:var(--dark-green);box-shadow:0 0 0 2px rgba(0,104,74,0.1)}
  .stages-table input[type=date]{min-width:120px}
  .dt-pair{display:flex;flex-direction:column;gap:4px}
  .dt-pair input{font-size:11px;padding:4px 8px}
  .dt-pair .dt-label{font-family:'Source Code Pro',monospace;font-size:9px;letter-spacing:1px;color:var(--cool-gray);text-transform:uppercase;margin-bottom:2px}

  /* ===== SCHEDULE BADGE ===== */
  .sched-badge{padding:3px 10px;border-radius:100px;font-family:'Source Code Pro',monospace;font-size:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;display:inline-block;white-space:nowrap}
  .sched-badge.on-track{background:rgba(0,237,100,0.15);color:var(--dark-green)}
  .sched-badge.delayed{background:#fdedeb;color:#cd2c2c}
  .sched-badge.done-on-time{background:var(--forest);color:var(--mg-green)}
  .sched-badge.done-late{background:#fff3e0;color:#cc7700}
  .sched-badge.done-early{background:rgba(0,108,250,0.1);color:var(--action-blue)}

    const [plan_s, plan_e, dev_s, dev_e, qa_s, qa_e] = sched;
    const def = (s, e, owner) => ({status:'todo', start:s, end:e, actualStart:'', actualEnd:'', owner:owner ? [owner] : [], notes:''});

    // 우선순위: Phase 1 = high, Phase 2 = medium, Phase 3 = low
    const urgency = phase === 'Phase 1' ? 'high' : (phase === 'Phase 2' ? 'medium' : 'low');
    return {
      id, name, type, area, expert, phase, priority, urgency,
      manuscript: { received: false, date: '', source: expert },
      videoCount: phase1_1[id] || phase1_2[id] ? 3 : 2,
      kanban: inProgress ? 'plan' : 'todo',
      stages: {

// ============== Helpers ==============
function phaseClass(phase) {
  if (phase === 'Phase 1') return 'p1';
  if (phase === 'Phase 2') return 'p2';
  return '';
}
function progressBars(l) {
  return ['plan','ui','art','dev','video','qa'].map(s => {
    const stg = l.stages[s];
    const ss = getStageScheduleStatus(stg);
    const delayCls = (ss.state === 'delayed' || ss.state === 'done-late') ? ' is-delayed' : '';
    return `<div class="lc-stage ${stg.status}${delayCls}"></div>`;
  }).join('');
}
function todayISO() { return new Date().toISOString().slice(0,10); }
function dateDiffDays(a, b) {
  if (!a || !b) return null;
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
function fmtMD(d) {
  if (!d) return '—';
  return d.slice(5).replace('-','/');
}
// 단계별 진척 상태 — 계획 vs 실제 비교
function getStageScheduleStatus(s) {
  const today = todayISO();
  if (s.status === 'done') {
    if (s.actualEnd && s.end) {
      const diff = dateDiffDays(s.end, s.actualEnd); // +지연 / -빠름
      if (diff > 0) return {state:'done-late', days:diff, label:`${diff}일 늦게 완료`};
      if (diff < 0) return {state:'done-early', days:-diff, label:`${-diff}일 빨리 완료`};
      return {state:'done-on-time', days:0, label:'정시 완료'};
    }
    return {state:'done', days:0, label:'완료'};
  }
  if (s.status === 'in-progress') {
    if (s.end) {
      const diff = dateDiffDays(today, s.end); // +남음 / -지연
      if (diff < 0) return {state:'delayed', days:-diff, label:`${-diff}일 지연`};
      if (diff === 0) return {state:'on-track', days:0, label:'오늘 마감'};
      if (diff <= 2) return {state:'on-track', days:diff, label:`${diff}일 남음`};
      return {state:'on-track', days:diff, label:`${diff}일 남음`};
    }
    return {state:'on-track', days:0, label:'진행 중'};
  }
  // todo
  if (s.start) {
    const diff = dateDiffDays(today, s.start); // +시작전 / -시작지연
    if (diff < 0) return {state:'delayed', days:-diff, label:`시작 ${-diff}일 지연`};
    if (diff === 0) return {state:'not-started', days:0, label:'오늘 시작 예정'};
    return {state:'not-started', days:diff, label:`${diff}일 후 시작`};
  }
  return {state:'no-plan', days:0, label:'일정 미정'};
}
// 차시 전체 진척 상태 — 가장 큰 지연 표시
function getLessonScheduleStatus(l) {
  const stages = ['plan','ui','art','dev','video','qa'];
  let maxDelay = 0;
  let allDone = true;
  for (const k of stages) {
    const s = l.stages[k];
    if (s.status !== 'done') allDone = false;
    const ss = getStageScheduleStatus(s);
    if (ss.state === 'delayed' || ss.state === 'done-late') {
      maxDelay = Math.max(maxDelay, ss.days);
    }
  }
  if (allDone) return {state:'done', label:'✓ 완료'};
  if (maxDelay > 0) return {state:'delayed', label:`${maxDelay}일 지연`};
  return {state:'on-track', label:'정상'};
}
function getFiltered() {
  const f = {
    phase: document.getElementById('filter-phase').value,
    type: document.getElementById('filter-type').value,
    urgency: document.getElementById('filter-urgency')?.value || '',
    manuscript: document.getElementById('filter-manuscript')?.value || '',
    issue: document.getElementById('filter-issue').value,
    search: document.getElementById('filter-search').value.toLowerCase().trim()
  };
  return data.lessons.filter(l => {
    if (f.phase && l.phase !== f.phase) return false;
    if (f.type && l.type !== f.type) return false;
    if (f.urgency && (l.urgency||'medium') !== f.urgency) return false;
    if (f.manuscript === 'received' && !(l.manuscript && l.manuscript.received)) return false;
    if (f.manuscript === 'pending' && l.manuscript && l.manuscript.received) return false;
    if (f.search && !(l.id.toLowerCase().includes(f.search) || l.name.toLowerCase().includes(f.search) || l.expert.toLowerCase().includes(f.search))) return false;
    if (f.issue === 'open' && l.issues.filter(i => i.status === 'open').length === 0) return false;
    if (f.issue === 'none' && l.issues.filter(i => i.status === 'open').length > 0) return false;
    return true;
  });
}
function lessonCard(l, draggable = false) {
  const openIssues = l.issues.filter(i => i.status === 'open').length;
  const dragAttr = draggable ? 'draggable="true" ondragstart="dragStart(event)" ondragend="dragEnd(event)"' : '';
  const ls = getLessonScheduleStatus(l);
  const urgency = l.urgency || 'medium';
  const msReceived = l.manuscript && l.manuscript.received;
  const cardClasses = [
    'lesson-card',
    ls.state === 'delayed' ? 'is-delayed' : '',
    !msReceived ? 'is-ms-pending' : ''
  ].filter(Boolean).join(' ');
  return `
    <div class="${cardClasses}" ${dragAttr} data-lesson-id="${l.id}" onclick="openModal('${l.id}')">
      <div class="lc-phase ${phaseClass(l.phase)}">${l.phase}</div>
      <div class="lc-sched"><span class="sched-badge ${ls.state}">${ls.label}</span></div>
      <div class="lc-id">${l.id} <span class="urgency-dot ${urgency}" title="우선순위 ${urgency}"></span></div>
      <div class="lc-name">${l.name}</div>
      <div class="lc-meta">${l.expert} · ${l.priority || ''}</div>
      <div class="lc-stages">${progressBars(l)}</div>

      </div>
      <div class="lc-footer">
        ${msReceived
          ? `<span class="badge-ms ok">📄 원고 OK</span>`

        ${openIssues > 0

          : `<span class="badge-issue ok">CLEAN</span>`}
        <span class="badge-video">🎬 ${l.videoCount}</span>
      </div>
    </div>
  `;
}

function renderKanban() {
  const filtered = getFiltered();
  document.getElementById('count').textContent = `${filtered.length} / ${data.lessons.length} 차시`;
  const cols = {};
  KANBAN_COLS.forEach(c => cols[c] = []);

    if (cols[k]) cols[k].push(l);
    else cols.plan.push(l);
  });

      <div class="kanban-col" data-col="${c}"
           ondragover="dragOver(event)" ondragenter="dragEnter(event)"
           ondragleave="dragLeave(event)" ondrop="drop(event)">

        ${items}
      </div>`;

function renderIssues() {
  const all = [];
  data.lessons.forEach(l => l.issues.forEach(i => all.push({...i, lessonId:l.id, lessonName:l.name, lessonPhase:l.phase, lessonType:l.type})));
  const f = {
    phase: document.getElementById('filter-phase').value,
    type: document.getElementById('filter-type').value,
    search: document.getElementById('filter-search').value.toLowerCase().trim()
  };
  let filtered = all.filter(i => {
    if (f.phase && i.lessonPhase !== f.phase) return false;
    if (f.type && i.lessonType !== f.type) return false;
    if (f.search && !(i.title.toLowerCase().includes(f.search) || (i.description||'').toLowerCase().includes(f.search) || i.lessonId.toLowerCase().includes(f.search))) return false;
    return true;
  });
  filtered.sort((a,b) => {
    if (a.status !== b.status) return a.status === 'open' ? -1 : 1;
    const p = {high:0, medium:1, low:2};
    if (p[a.priority] !== p[b.priority]) return p[a.priority] - p[b.priority];
    return (b.created||'').localeCompare(a.created||'');
  });
  document.getElementById('count').textContent = `${filtered.length} 이슈`;
  const items = filtered.map(i => `
    <div class="issue-item ${i.priority} ${i.status==='closed'?'closed':''}" onclick="openModal('${i.lessonId}')">
      <div class="ii-head">
        <span class="ii-lesson">${i.lessonId}</span>
        <span class="ii-prio ${i.priority}">${i.priority}</span>
        <span class="ii-status ${i.status}">${i.status === 'open' ? '🔴 OPEN' : '✓ CLOSED'}</span>
      </div>
      <div class="ii-title">${i.title}</div>
      ${i.description ? `<div class="ii-desc">${i.description}</div>` : ''}
      <div class="ii-meta">생성: ${i.created || '—'}${i.resolved ? ' · 해결: '+i.resolved : ''} · ${i.lessonName}</div>
    </div>`).join('');
  document.getElementById('main').innerHTML = items ? `<div class="issue-list">${items}</div>` : `<div style="text-align:center;padding:60px;color:var(--cool-gray);font-family:'Source Code Pro',monospace;letter-spacing:2px;text-transform:uppercase">No Issues</div>`;
}

// ============== Drag & Drop (Kanban) ==============
let dragLessonId = null;
function dragStart(e) {
  dragLessonId = e.target.dataset.lessonId;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function dragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
}
function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function dragEnter(e) {
  const col = e.target.closest('.kanban-col');
  if (col) col.classList.add('drag-over');
}
function dragLeave(e) {
  const col = e.target.closest('.kanban-col');
  if (col && !col.contains(e.relatedTarget)) col.classList.remove('drag-over');
}
function drop(e) {
  e.preventDefault();
  const col = e.target.closest('.kanban-col');
  if (!col || !dragLessonId) return;
  const newCol = col.dataset.col;
  const lesson = data.lessons.find(l => l.id === dragLessonId);
  if (lesson) {
    lesson.kanban = newCol;
    // 칸반 컬럼에 따라 단계 status 일괄 업데이트 (이전 단계는 자동 완료)
    const rule = STAGE_RULES[newCol];
    const today = todayISO();
    if (rule) {
      ['plan','ui','art','dev','video','qa'].forEach(s => {
        const newStatus = rule[s];
        lesson.stages[s].status = newStatus;
        // 자동 실제 일정 기록
        if (newStatus === 'in-progress' && !lesson.stages[s].actualStart) {
          lesson.stages[s].actualStart = today;
        }
        if (newStatus === 'done') {
          if (!lesson.stages[s].actualStart) lesson.stages[s].actualStart = today;
          if (!lesson.stages[s].actualEnd) lesson.stages[s].actualEnd = today;
        }
        if (newStatus === 'todo') {
          lesson.stages[s].actualStart = '';
          lesson.stages[s].actualEnd = '';
        }
      });
    }
    saveData();
    render();
    toast(`${lesson.id} → ${KANBAN_LABELS[newCol]}`, 'success');
  }
  dragLessonId = null;
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('active');
  currentLessonId = null;
  render();
}
function updateStage(k, f, v) {
  const l = data.lessons.find(x => x.id === currentLessonId);
  if (!l) return;
  l.stages[k][f] = v;
  if (f === 'status') {
    const today = todayISO();
    if (v === 'in-progress' && !l.stages[k].actualStart) {
      l.stages[k].actualStart = today;
    }
    if (v === 'done') {
      if (!l.stages[k].actualStart) l.stages[k].actualStart = today;
      if (!l.stages[k].actualEnd) l.stages[k].actualEnd = today;
    }
    if (v === 'todo') {
      l.stages[k].actualStart = '';
      l.stages[k].actualEnd = '';
    }
    saveData();
    openModal(currentLessonId);
    toast('저장됨', 'success');
    return;
  }
  saveData();
  toast('저장됨', 'success');
}
function updateLesson(f, v) {
  const l = data.lessons.find(x => x.id === currentLessonId);
  if (!l) return;
  l[f] = v;
  saveData();
  if (f === 'urgency' || f === 'kanban') {
    openModal(currentLessonId);
  }
  toast('저장됨', 'success');
}
function updateManuscript(f, v) {
  const l = data.lessons.find(x => x.id === currentLessonId);
  if (!l) return;
  if (!l.manuscript) l.manuscript = { received: false, date: '', source: '' };
  l.manuscript[f] = v;
  // 수령 완료로 토글하면 오늘 날짜 자동 입력
  if (f === 'received' && v === true && !l.manuscript.date) {
    l.manuscript.date = todayISO();
  }
  saveData();
  openModal(currentLessonId);
  toast(v && f==='received' ? '원고 수령 기록' : '저장됨', 'success');
}
function addIssue() {
  const title = document.getElementById('new-issue-title').value.trim();
  if (!title) { toast('제목을 입력하세요', 'error'); return; }
  const desc = document.getElementById('new-issue-desc').value.trim();
  const priority = document.getElementById('new-issue-priority').value;
  const l = data.lessons.find(x => x.id === currentLessonId);
  if (!l) return;
  l.issues.push({
    id: 'I-' + Math.random().toString(36).substr(2,6),
    title, description: desc, status: 'open',
    priority, created: new Date().toISOString().slice(0,10), resolved: null
  });
  saveData();
  openModal(currentLessonId);
  toast('이슈 추가됨', 'success');
}
function toggleIssue(id) {
  const l = data.lessons.find(x => x.id === currentLessonId);
  const i = l && l.issues.find(x => x.id === id);
  if (!i) return;
  if (i.status === 'open') { i.status = 'closed'; i.resolved = new Date().toISOString().slice(0,10); }
  else { i.status = 'open'; i.resolved = null; }
  saveData();
  openModal(currentLessonId);
}
function deleteIssue(id) {
  if (!confirm('이 이슈를 삭제하시겠습니까?')) return;
  const l = data.lessons.find(x => x.id === currentLessonId);
  if (!l) return;
  l.issues = l.issues.filter(x => x.id !== id);
  saveData();
  openModal(currentLessonId);
}

      if (!imp.lessons || !imp.milestones) throw new Error('형식 오류');
      data = imp;
      saveData();

    } catch(err) { toast('JSON 오류: '+err.message, 'error'); }
  };
  r.readAsText(file);
}

function startFirestore() {
  if (!window.fbOnSnap) return;
  window.fbOnSnap(async (snap) => {
    if (!snap.exists()) {
      data = JSON.parse(JSON.stringify(SEED));
      await window.fbSetDoc(data);
      toast('초기 데이터 생성됨', 'success');
      return;
    }
    const isSelfWrite = snap.metadata && snap.metadata.hasPendingWrites;

    // 🔥 내가 방금 저장한 echo는 완전히 무시
    if (isSelfWrite) return;

    data = snap.data();
    if (!data.lessons || data.lessons.length === 0) {
      console.warn('Firestore 데이터 비어있음');
      return;
    }
    const u = data.updated ? new Date(data.updated).toLocaleString('ko-KR') : '—';
    document.getElementById('updated').textContent = '🟢 실시간 · 최종 ' + u;
    // 본인이 방금 저장한 echo면 UI 갱신 스킵 (드롭다운/달력 보호)
    if (isSelfWrite) return;
    // 다른 사용자 변경 — 모달 안 input/select에 포커스 있으면 갱신 스킵
    const af = document.activeElement;
    const modalBg = document.getElementById('modal-bg');

    const inModalInput =
      af &&
      modalBg &&
      modalBg.contains(af) &&
      /^(INPUT|SELECT|TEXTAREA)$/.test(af.tagName);

    // 🔥 입력 중이면 화면 갱신 자체 금지
    if (inModalInput) {
      _suppressSave = false;
      return;
    }
    render();
    
  });
  _suppressSave = false;
}
if (window.fbReady) startFirestore();
else document.addEventListener('fbready', startFirestore);
</script>

</body>
</html>
